<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>PGA — Notifications</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/pga-shared.css">

<script src="../js/pga-config.js"></script>
<script src="../js/pga-api.js?v=open-1.0"></script>
<script src="../js/pga-ui.js?v=open-1.0"></script>
<script src="../js/pga-layout.js?v=open-1.0"></script>
<style>
.notif-item {
  display: flex; gap: 14px; padding: 14px 18px;
  border-bottom: 1px solid rgba(255,255,255,.04);
  cursor: pointer; transition: background .1s;
}
.notif-item:hover     { background: rgba(255,255,255,.02); }
.notif-item.non-lue   { background: rgba(91,156,246,.04); }
.notif-item:last-child{ border-bottom: none; }
.notif-icon {
  width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; margin-top: 1px;
}
.notif-icon svg { width: 18px; height: 18px; }
.notif-body { flex: 1; }
.notif-titre { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.notif-msg   { font-size: 12px; color: var(--text2); line-height: 1.5; }
.notif-time  { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); margin-top: 5px; }
.non-lue-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--blue); flex-shrink: 0; margin-top: 6px; }
</style>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<main class="main">
  <header class="topbar" id="topbar"></header>
  <div class="content">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <div class="tabs">
        <div class="tab active" data-filtre="tout"    onclick="changerFiltre(this)">Toutes</div>
        <div class="tab"        data-filtre="non-lue" onclick="changerFiltre(this)">Non lues <span class="count" id="cnt-nonlues">—</span></div>
      </div>
      <button class="btn-secondary btn-sm" onclick="toutLire()">Tout marquer comme lu</button>
    </div>
    <div class="panel" id="notif-panel">
      <div style="text-align:center;padding:30px;color:var(--text3)">Chargement…</div>
    </div>
  </div>
</main>
<script>
let filtreActif = 'tout';
const TYPE_CONFIG = {
  echeance_saisie:      { color: '#F0A030', bg: 'rgba(240,160,48,.1)', icon: '<path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/>' },
  paiement_disponible:  { color: '#2ECC7A', bg: 'rgba(46,204,122,.1)', icon: '<path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/>' },
  cnib_expiration:      { color: '#E8524A', bg: 'rgba(232,82,74,.1)', icon:  '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>' },
  asbc_validation_requise:{color:'#5B9CF6',bg: 'rgba(91,156,246,.1)',  icon:  '<path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>' },
  paiement_echec:       { color: '#E8524A', bg: 'rgba(232,82,74,.1)', icon:  '<path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/>' },
  default:              { color: '#5A6578', bg: 'var(--bg3)',          icon:  '<path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>' },
};

document.addEventListener('DOMContentLoaded', async () => {
  await PGA_LAYOUT.init('', 'Notifications');
  chargerNotifications();
});

function changerFiltre(el) {
  document.querySelectorAll('[data-filtre]').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  filtreActif = el.dataset.filtre;
  chargerNotifications();
}

async function chargerNotifications() {
  const panel = document.getElementById('notif-panel');
  panel.innerHTML = `<div style="text-align:center;padding:30px">${PGA_UI.spinnerHtml(20)}</div>`;
  try {
    const res = filtreActif === 'non-lue'
      ? await PGA_API.notifications.nonLues()
      : await PGA_API.notifications.liste();

    const data = res.data || [];
    const nonLues = (await PGA_API.notifications.nonLues()).total || 0;
    document.getElementById('cnt-nonlues').textContent = nonLues;

    if (!data.length) {
      panel.innerHTML = `<div class="empty-state"><span class="ico">🔔</span><p>Aucune notification.</p></div>`;
      return;
    }

    panel.innerHTML = data.map(n => {
      const cfg = TYPE_CONFIG[n.type] || TYPE_CONFIG.default;
      const temps = n.created_at ? new Date(n.created_at).toLocaleString('fr-FR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '—';
      return `
        <div class="notif-item ${n.lue ? '' : 'non-lue'}" onclick="marquerLue('${n.id}', this)">
          <div class="notif-icon" style="background:${cfg.bg}">
            <svg viewBox="0 0 24 24" style="fill:${cfg.color}">${cfg.icon}</svg>
          </div>
          <div class="notif-body">
            <div class="notif-titre">${n.titre}</div>
            <div class="notif-msg">${n.message}</div>
            <div class="notif-time">${temps}</div>
          </div>
          ${!n.lue ? '<div class="non-lue-dot"></div>' : ''}
        </div>
      `;
    }).join('');
  } catch (err) { PGA_UI.toast(err.message, 'error'); }
}

async function marquerLue(id, el) {
  if (el.classList.contains('non-lue')) {
    try {
      await PGA_API.notifications.marquerLue(id);
      el.classList.remove('non-lue');
      el.querySelector('.non-lue-dot')?.remove();
    } catch {}
  }
}

async function toutLire() {
  try {
    const res = await PGA_API.notifications.toutLire();
    PGA_UI.toast(`${res.nb} notification(s) marquées comme lues.`, 'success');
    chargerNotifications();
  } catch (err) { PGA_UI.toast(err.message, 'error'); }
}
</script>
</body>
</html>
